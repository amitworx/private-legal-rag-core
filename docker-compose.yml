services:
  postgres:
    image: postgres:16
    container_name: rag-llm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag_llm
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_llm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
